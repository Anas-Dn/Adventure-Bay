<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADVENTURE BAY</title>
    <link rel="stylesheet" href="../CSS/jeu.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header id="header">
        <div class="head">
            <img src="../assets/logo.png" class="logo" alt="">
            <ul class="nav-ul">
                <li><a href="../index.html" class="ACCUEIL"><i data-lucide="castle" class="castle"></i>ACCUEIL</a></li>
                <li><a href="concept.html" class="Concept"><i data-lucide="puzzle" class="puzzle"></i> Concept</a></li>
                <li><a href="anniversaire.html" class="Anniversaire"><i data-lucide="cake" class="cake"></i> Anniversaire</a></li>
                <li><a href="#" class="Jeu active"><i data-lucide="gamepad-2" class="gamepad"></i>  Jeu</a></li>
                <li><a href="contact.html" class="Contact"><i data-lucide="mail" class="mail"></i> Contact</a></li>
            </ul>
            <a href="#" class="button-nav">Trouver notre parc</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-con">
            <h1 class="hero-h1">NOS JEUX</h1>
            <h3>Découvrez nos activités et amusez-vous</h3>
        </div>
    </section>

    <section class="sec-2">
        <div class="head">
            <div class="input">
                <input type="text" placeholder="Rechercher Un Jeu">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="jeu-name">

                <div class="br">
                    <div class="name active">
                        <i data-lucide="gamepad-2"></i>
                        <p>Tous</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="mouse-pointer-2"></i>
                        <p>Jeux De Tir</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="zap"></i>
                        <p>Jeu De Course</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="trophy"></i>
                        <p>Jeu De Sport</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="zap"></i>
                        <p>Expérience VR</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="trophy"></i>
                        <p>Jeu A Prix</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="gamepad-2"></i>
                        <p>Jeu Pour Enfants</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="trophy"></i>
                        <p>Jeu A Tickets</p>
                    </div>
                </div>
                <div class="br">
                    <div class="name">
                        <i data-lucide="gamepad-2"></i>
                        <p>Jeu Classiques</p>
                    </div>
                </div>

            </div>
        </div>

        <div class="jeu" id="jeu"></div>

    </section>
    






    <button id="top" class="arrow-top"><i class="fa-solid fa-angle-up"></i></button>



    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../JS/jeu.js"></script>
</body>
</html>
